services:
  postgres:
    image: postgres:17-alpine
    container_name: starbridge-postgres
    environment:
      POSTGRES_DB: starbridge
      POSTGRES_USER: starbridge
      POSTGRES_PASSWORD: starbridge
    ports:
      - "55432:5432"
    volumes:
      - starbridge-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starbridge -d starbridge"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    image: node:22-bookworm-slim
    container_name: starbridge-api
    working_dir: /workspace/StarBridge
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql://starbridge:starbridge@postgres:5432/starbridge
      PORT: 5174
      HOST: 0.0.0.0
      STARBRIDGE_REPOSITORY: prisma
    command: sh -c "npm install && npm run db:generate && npm run db:deploy && npm run db:seed && npm run dev:api"
    ports:
      - "5174:5174"
    volumes:
      - ..:/workspace
      - starbridge-node-modules:/workspace/StarBridge/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    container_name: starbridge-web
    working_dir: /workspace/StarBridge
    env_file:
      - path: .env
        required: false
    environment:
      VITE_API_BASE_URL: /api
    command: sh -c "npm install && npm run dev:web"
    ports:
      - "5175:5175"
    volumes:
      - ..:/workspace
      - starbridge-node-modules:/workspace/StarBridge/node_modules
    depends_on:
      - api

  gateway:
    image: nginx:1.27-alpine
    container_name: starbridge-gateway
    ports:
      - "${GATEWAY_PORT:-5280}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  starbridge-postgres:
  starbridge-node-modules:
